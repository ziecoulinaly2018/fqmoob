<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>fqmoob</title>
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --space-2: 0.5rem; --space-3: 0.75rem; --space-4: 1rem;
      --space-6: 1.5rem; --space-8: 2rem;
      --radius-lg: 0.75rem; --radius-full: 9999px;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-body: 'Satoshi', 'Inter', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }

    body {
      min-height: 100dvh;
      font-family: var(--font-body);
      font-size: var(--text-base);
      color: #f0f0f0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: var(--space-8) var(--space-4);
      position: relative;
      overflow-x: hidden;
      background: #07050f;
    }

    /* Fond avec orbes colorées + flou 60% */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }
    .bg::before {
      content: '';
      position: absolute;
      width: 70vw; height: 70vw;
      max-width: 600px; max-height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(120, 40, 200, 0.85) 0%, rgba(80, 10, 160, 0.4) 50%, transparent 70%);
      top: -15%; left: -10%;
      filter: blur(80px);
      animation: drift1 12s ease-in-out infinite alternate;
    }
    .bg::after {
      content: '';
      position: absolute;
      width: 60vw; height: 60vw;
      max-width: 500px; max-height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30, 100, 255, 0.75) 0%, rgba(10, 60, 180, 0.35) 50%, transparent 70%);
      bottom: -10%; right: -10%;
      filter: blur(90px);
      animation: drift2 15s ease-in-out infinite alternate;
    }
    .bg-extra {
      position: absolute;
      width: 50vw; height: 50vw;
      max-width: 400px; max-height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(220, 40, 140, 0.6) 0%, rgba(150, 20, 100, 0.25) 50%, transparent 70%);
      top: 40%; left: 50%; transform: translate(-50%, -50%);
      filter: blur(100px);
      animation: drift3 18s ease-in-out infinite alternate;
    }

    /* Grain overlay subtil */
    .bg-grain {
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.35;
      pointer-events: none;
    }

    @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(5%,8%) scale(1.1); } }
    @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-6%,-5%) scale(1.15); } }
    @keyframes drift3 { from { transform: translate(-50%,-50%) scale(1); } to { transform: translate(-45%,-55%) scale(1.2); } }

    /* Contenu */
    .container {
      width: 100%; max-width: 480px;
      display: flex; flex-direction: column;
      align-items: center; gap: var(--space-6);
      position: relative; z-index: 1;
    }

    .theme-toggle {
      position: fixed; top: var(--space-4); right: var(--space-4);
      width: 44px; height: 44px; border-radius: var(--radius-full);
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6); display: flex; align-items: center;
      justify-content: center; cursor: pointer; transition: all var(--transition);
      z-index: 10;
    }
    .theme-toggle:hover { color: #fff; background: rgba(255,255,255,0.14); }

    .avatar {
      width: 88px; height: 88px; border-radius: var(--radius-full);
      background: linear-gradient(135deg, #6366f1, #ec4899);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; color: #fff;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.1), 0 8px 32px rgba(99,40,200,0.5);
    }

    .profile-info { text-align: center; display: flex; flex-direction: column; gap: var(--space-2); }
    .profile-name { font-size: var(--text-xl); font-weight: 700; line-height: 1.1; color: #fff; }
    .profile-bio { font-size: var(--text-sm); color: rgba(255,255,255,0.5); max-width: 36ch; line-height: 1.5; }

    .insta-row {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-3);
    }

    .links { width: 100%; display: flex; flex-direction: column; gap: var(--space-3); }

    .link-btn {
      display: flex; align-items: center; gap: var(--space-4);
      padding: var(--space-4) var(--space-6); border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #f0f0f0; text-decoration: none; font-weight: 500;
      font-size: var(--text-base);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
      transition: all var(--transition); cursor: pointer;
    }
    .link-btn:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      border-color: rgba(255,255,255,0.18);
    }
    .link-btn:active { transform: translateY(0); }

    .link-btn.insta-card {
      flex-direction: column; align-items: center;
      justify-content: center; gap: var(--space-2);
      padding: var(--space-4) var(--space-3); text-align: center;
    }

    .link-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .link-icon img { width: 24px; height: 24px; }
    .link-btn.youtube .link-icon { background: #ff0000; }
    .link-btn.instagram .link-icon,
    .link-btn.insta-card .link-icon { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }

    .link-label { flex: 1; font-weight: 600; color: #fff; }
    .insta-card .link-label { flex: unset; font-size: var(--text-sm); font-weight: 600; color: #fff; }
    .insta-card .link-handle { font-size: var(--text-sm); color: rgba(255,255,255,0.5); }

    .link-arrow { color: rgba(255,255,255,0.4); transition: transform var(--transition); }
    .link-btn:hover .link-arrow { transform: translateX(4px); color: #fff; }
    .footer { font-size: var(--text-sm); color: rgba(255,255,255,0.25); }
  </style>
</head>
<body>

  <!-- Fond -->
  <div class="bg">
    <div class="bg-extra"></div>
    <div class="bg-grain"></div>
  </div>

  <button class="theme-toggle" data-theme-toggle aria-label="Thème">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
    </svg>
  </button>

  <div class="container">
    <div class="avatar">FQ</div>
    <div class="profile-info">
      <h1 class="profile-name">fqmoob</h1>
      <p class="profile-bio">🎬 Créateur de contenu · Retrouve-moi sur mes réseaux 👇</p>
    </div>

    <div class="insta-row">
      <a class="link-btn instagram insta-card" href="https://www.instagram.com/fq.moob/" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><img src="https://cdn.simpleicons.org/instagram/white" alt="Instagram"></div>
        <span class="link-label">Instagram</span>
        <span class="link-handle">@fq.moob</span>
      </a>
      <a class="link-btn instagram insta-card" href="https://www.instagram.com/fq.world/" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><img src="https://cdn.simpleicons.org/instagram/white" alt="Instagram"></div>
        <span class="link-label">Instagram</span>
        <span class="link-handle">@fq.world</span>
      </a>
    </div>

    <div class="links">
      <a class="link-btn youtube" href="https://www.youtube.com/@FQMob" target="_blank" rel="noopener noreferrer">
        <div class="link-icon"><img src="https://cdn.simpleicons.org/youtube/white" alt="YouTube"></div>
        <span class="link-label">YouTube</span>
        <span class="link-arrow">→</span>
      </a>
    </div>

    <p class="footer">fqmoob · 2026</p>
  </div>

  <script>
    (function(){
      const t=document.querySelector('[data-theme-toggle]'),r=document.documentElement;
      let d='dark';
      r.setAttribute('data-theme',d);
    })();
  </script>
</body>
</html>
